<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Outreach overzicht</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      --bg: #faf8f4;
      --surface: #ffffff;
      --ink: #211f1c;
      --ink-soft: #6b6863;
      --border: #e4e0d7;
      --red: #c43e2f;
      --red-bg: #fbeae7;
      --amber: #b5790e;
      --amber-bg: #fbf1dd;
      --green: #3f7d3c;
      --green-bg: #eaf3e8;
      --gray: #8a8781;
      --gray-bg: #f0eee8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: 'Inter', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .wrap {
      max-width: 880px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }
    header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 32px;
    }
    .rec-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--red);
      flex-shrink: 0;
      animation: pulse 2s ease-in-out infinite;
    }
    @media (prefers-reduced-motion: reduce) {
      .rec-dot { animation: none; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: 28px;
      margin: 0;
      letter-spacing: -0.01em;
    }
    .sub {
      margin: 4px 0 0;
      color: var(--ink-soft);
      font-size: 14px;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
    }
    .stat-num {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: 26px;
      display: block;
    }
    .stat-label {
      color: var(--ink-soft);
      font-size: 13px;
      margin-top: 2px;
    }
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .scroll-x { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      min-width: 560px;
    }
    th {
      text-align: left;
      font-weight: 500;
      color: var(--ink-soft);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    .handle { font-weight: 500; }
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
    }
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-sent { background: var(--red-bg); color: var(--red); }
    .status-sent .dot { background: var(--red); }
    .status-waiting { background: var(--amber-bg); color: var(--amber); }
    .status-waiting .dot { background: var(--amber); }
    .status-replied { background: var(--green-bg); color: var(--green); }
    .status-replied .dot { background: var(--green); }
    .status-other { background: var(--gray-bg); color: var(--gray); }
    .status-other .dot { background: var(--gray); }
    .note { color: var(--ink-soft); }
    .state-msg {
      padding: 60px 24px;
      text-align: center;
      color: var(--ink-soft);
      font-size: 14px;
    }
    @media (max-width: 600px) {
      .stats { grid-template-columns: 1fr; }
      .wrap { padding: 28px 16px 60px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="rec-dot" aria-hidden="true"></div>
      <div>
        <h1 id="client-name">Outreach overzicht</h1>
        <p class="sub" id="last-updated">Bezig met laden…</p>
      </div>
    </header>

    <div class="stats" id="stats" style="display:none">
      <div class="stat-card">
        <span class="stat-num" id="stat-total">0</span>
        <span class="stat-label">Totaal benaderd</span>
      </div>
      <div class="stat-card">
        <span class="stat-num" id="stat-replied">0</span>
        <span class="stat-label">Gereageerd</span>
      </div>
      <div class="stat-card">
        <span class="stat-num" id="stat-waiting">0</span>
        <span class="stat-label">Wachtend op reactie</span>
      </div>
    </div>

    <div class="table-wrap">
      <div class="scroll-x">
        <div id="content" class="state-msg">Overzicht laden…</div>
      </div>
    </div>
  </div>

  <script>
    // === Instellen ===
    // 1. Vul hier je Make webhook-URL in — de NIEUWE, aparte read-only webhook.
    //    Niet dezelfde webhook die outreach-submissions ontvangt.
    const MAKE_WEBHOOK_URL = 'https://hook.eu2.make.com/VUL_HIER_JE_WEBHOOK_URL_IN';
    // 2. Pas eventueel de titel aan.
    const CLIENT_LABEL = 'Outreach overzicht';

    document.getElementById('client-name').textContent = CLIENT_LABEL;

    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    const contentEl = document.getElementById('content');
    const updatedEl = document.getElementById('last-updated');
    const statsEl = document.getElementById('stats');

    function statusInfo(raw) {
      const s = (raw || '').toLowerCase();
      if (s.includes('gereageerd') || s.includes('interesse') || s.includes('replied')) {
        return { cls: 'status-replied', label: raw || 'Gereageerd' };
      }
      if (s.includes('verzonden') || s.includes('sent')) {
        return { cls: 'status-sent', label: raw || 'Verzonden' };
      }
      if (s.includes('wacht') || s.includes('waiting') || s.includes('geen reactie')) {
        return { cls: 'status-waiting', label: raw || 'Wachtend' };
      }
      return { cls: 'status-other', label: raw || 'Onbekend' };
    }

    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, (c) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    function render(records) {
      if (!Array.isArray(records) || records.length === 0) {
        contentEl.className = 'state-msg';
        contentEl.textContent = 'Nog geen outreach-pogingen geregistreerd.';
        return;
      }

      statsEl.style.display = 'grid';
      let replied = 0;
      let waiting = 0;

      const rows = records.map((r) => {
        // Pas deze veldnamen aan zodat ze overeenkomen met je data store kolommen.
        const handle = r.handle || r.instagram_handle || r.username || '—';
        const status = statusInfo(r.status);
        const date = r.date || r.datum || '—';
        const note = r.note || r.notitie || '';

        if (status.cls === 'status-replied') replied++;
        if (status.cls === 'status-waiting' || status.cls === 'status-sent') waiting++;

        return `<tr>
          <td class="handle">${escapeHtml(handle)}</td>
          <td><span class="status-pill ${status.cls}"><span class="dot"></span>${escapeHtml(status.label)}</span></td>
          <td>${escapeHtml(date)}</td>
          <td class="note">${escapeHtml(note)}</td>
        </tr>`;
      }).join('');

      document.getElementById('stat-total').textContent = records.length;
      document.getElementById('stat-replied').textContent = replied;
      document.getElementById('stat-waiting').textContent = waiting;

      contentEl.outerHTML = `<table>
        <thead><tr>
          <th>Instagram</th><th>Status</th><th>Datum</th><th>Notitie</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
    }

    function showError(message) {
      contentEl.className = 'state-msg';
      contentEl.textContent = message;
      updatedEl.textContent = 'Laden mislukt';
    }

    if (!token) {
      showError('Geen toegangslink herkend. Vraag een nieuwe link aan.');
    } else {
      // Gewone fetch, standaard mode 'cors' — GEEN no-cors.
      // Met no-cors kan de browser het antwoord niet lezen, ook al komt het aan bij Make.
      fetch(`${MAKE_WEBHOOK_URL}?token=${encodeURIComponent(token)}`)
        .then((res) => {
          if (res.status === 401) throw new Error('Deze link is niet (meer) geldig.');
          if (!res.ok) throw new Error('Overzicht kon niet worden opgehaald.');
          return res.json();
        })
        .then((data) => {
          render(data);
          updatedEl.textContent = 'Laatst bijgewerkt: ' + new Date().toLocaleString('nl-NL');
        })
        .catch((err) => {
          showError(err.message || 'Er ging iets mis bij het laden.');
        });
    }
  </script>
</body>
</html>

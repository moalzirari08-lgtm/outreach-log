<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Outreach log</title>
<style>
  :root{
    --paper:#F2EDE2;
    --paper-line:#DFD8C6;
    --ink:#241F1A;
    --ink-soft:#6B6355;
    --send:#2B4C6F;
    --send-soft:#DCE6EE;
    --reply:#3B6B4A;
    --reply-soft:#DEEBE1;
    --error:#9A3324;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:28px 16px 60px;
  }
  main{width:100%;max-width:420px;}

  .eyebrow{
    font-size:12px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--ink-soft);
    margin:0 0 6px;
  }
  h1{
    font-family:Georgia,"Times New Roman",serif;
    font-weight:600;
    font-size:26px;
    margin:0 0 22px;
    letter-spacing:-.01em;
  }

  label{
    display:block;
    font-size:13px;
    color:var(--ink-soft);
    margin-bottom:6px;
  }
  input[type=text], textarea{
    width:100%;
    font-size:17px;
    font-family:inherit;
    padding:13px 14px;
    border:1px solid var(--paper-line);
    border-radius:10px;
    background:#fff;
    color:var(--ink);
  }
  input[type=text]:focus, textarea:focus{
    outline:2px solid var(--send);
    outline-offset:1px;
  }
  textarea{resize:vertical;min-height:64px;margin-top:10px;}

  .logline{
    font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    font-size:13px;
    color:var(--ink-soft);
    background:#fff;
    border:1px dashed var(--paper-line);
    border-radius:8px;
    padding:10px 12px;
    margin:14px 0 22px;
    min-height:18px;
    word-break:break-word;
  }
  .logline b{color:var(--ink);font-weight:600;}

  .actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  button{
    font-family:inherit;
    font-size:15px;
    font-weight:600;
    padding:16px 10px;
    border-radius:10px;
    border:none;
    cursor:pointer;
    -webkit-tap-highlight-color:transparent;
  }
  button:disabled{opacity:.5;cursor:default;}
  #btnSend{background:var(--send);color:#fff;}
  #btnReply{background:var(--reply);color:#fff;}
  #btnSend:active, #btnReply:active{transform:scale(.98);}

  .replybox{display:none;margin-top:14px;}
  .replybox.show{display:block;}
  #btnConfirmReply{
    margin-top:10px;width:100%;background:var(--reply);color:#fff;
  }

  .status{
    margin-top:20px;
    padding:14px 16px;
    border-radius:10px;
    font-size:14px;
    line-height:1.5;
    display:none;
  }
  .status.show{display:block;}
  .status.ok{background:var(--reply-soft);color:var(--reply);}
  .status.err{background:#F5E4E0;color:var(--error);}
  .status.pending{background:var(--send-soft);color:var(--send);}

  .footnote{
    margin-top:34px;
    font-size:12px;
    color:var(--ink-soft);
    line-height:1.6;
    border-top:1px solid var(--paper-line);
    padding-top:16px;
  }
</style>
</head>
<body>
<main>
  <p class="eyebrow">Instagram outreach</p>
  <h1>Snel loggen</h1>

  <label for="handle">Instagram handle</label>
  <input type="text" id="handle" placeholder="@gebruikersnaam" autocomplete="off" autocapitalize="none">

  <div class="logline" id="logline">Vul een handle in om te beginnen.</div>

  <div class="actions">
    <button id="btnSend" disabled>Verzonden</button>
    <button id="btnReply" disabled>Reactie ontvangen</button>
  </div>

  <div class="replybox" id="replybox">
    <label for="bericht">Wat schreven ze terug? (optioneel)</label>
    <textarea id="bericht" placeholder="Korte samenvatting van de reactie..."></textarea>
    <button id="btnConfirmReply">Reactie loggen</button>
  </div>

  <div class="status" id="status"></div>

  <p class="footnote">Elke tik schrijft direct naar het gedeelde leadoverzicht. Er wordt niets lokaal bewaard &mdash; sluit dit venster gerust na gebruik.</p>
</main>

<script>
const WEBHOOK_URL = "https://hook.eu1.make.com/vsb8ospp93mry69u3wpf7vk7tglicsqh";

const handleInput = document.getElementById('handle');
const logline = document.getElementById('logline');
const btnSend = document.getElementById('btnSend');
const btnReply = document.getElementById('btnReply');
const replybox = document.getElementById('replybox');
const btnConfirmReply = document.getElementById('btnConfirmReply');
const berichtInput = document.getElementById('bericht');
const statusEl = document.getElementById('status');

function today(){
  return new Date().toLocaleDateString('nl-NL', {day:'numeric', month:'short'});
}

function cleanHandle(v){
  v = v.trim();
  if(v && !v.startsWith('@')) v = '@' + v;
  return v;
}

function updateLogline(){
  const h = cleanHandle(handleInput.value);
  const ready = h.length > 1;
  btnSend.disabled = !ready;
  btnReply.disabled = !ready;
  logline.innerHTML = ready
    ? `&rarr; <b>${h}</b> &middot; ${today()}`
    : 'Vul een handle in om te beginnen.';
  return h;
}
handleInput.addEventListener('input', updateLogline);

function showStatus(kind, text){
  statusEl.className = 'status show ' + kind;
  statusEl.textContent = text;
}

async function logActie(actie, bericht){
  const handle = cleanHandle(handleInput.value);
  if(handle.length < 2) return;

  btnSend.disabled = true;
  btnReply.disabled = true;
  btnConfirmReply.disabled = true;
  showStatus('pending', 'Bezig met loggen...');

  try{
    const res = await fetch(WEBHOOK_URL, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({handle, actie, bericht: bericht || ''})
    });
    if(!res.ok) throw new Error('Server antwoordde met status ' + res.status);

    showStatus('ok', actie === 'verzonden'
      ? `Gelogd: verzonden naar ${handle}.`
      : `Gelogd: reactie van ${handle} genoteerd.`);

    handleInput.value = '';
    berichtInput.value = '';
    replybox.classList.remove('show');
    updateLogline();
  }catch(err){
    showStatus('err', `Loggen mislukt (${err.message}). Controleer je internetverbinding en probeer opnieuw.`);
  }finally{
    const h = cleanHandle(handleInput.value);
    btnSend.disabled = h.length < 2;
    btnReply.disabled = h.length < 2;
    btnConfirmReply.disabled = false;
  }
}

btnSend.addEventListener('click', () => logActie('verzonden', ''));
btnReply.addEventListener('click', () => {
  replybox.classList.add('show');
  berichtInput.focus();
});
btnConfirmReply.addEventListener('click', () => logActie('reactie', berichtInput.value));
</script>
</body>
</html>
